name: Deploy Peluqueria a AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Angular
        run: |
          cd peluqueria-frontend
          npm install
          npm run build -- --configuration=production

      - name: Deploy to Frontend Server
        uses: appleboy/scp-action@master
        with:

          host: ${{ secrets.FRONTEND_IP }} 
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          proxy_host: ${{ secrets.BASTION_IP }}
          proxy_username: ubuntu
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}

          source: "peluqueria-frontend/dist/"
          target: "/var/www/html"
          strip_components: 2

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to API Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.API_IP }} 
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.BASTION_IP }}
          proxy_username: ubuntu
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "peluqueria-backend/"
          target: "/var/www/html"
          strip_components: 1

      - name: Configure .env and Laravel
        uses: appleboy/ssh-action@master
        with:

          host: ${{ secrets.API_IP }} 
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          proxy_host: ${{ secrets.BASTION_IP }}
          proxy_username: ubuntu
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/html
            
            cat <<EOF > .env
            APP_NAME="Peluquería Fernández"
            APP_ENV=production
            APP_KEY=base64:YaLMat52ab4qYWUk8Dv+O3KqA8XlDyroJyFR9IQtWUA=
            APP_DEBUG=false
            APP_URL=http://api.peluqueriafernandez.com
            FRONTEND_URL=http://frontend.peluqueriafernandez.com

            LOG_CHANNEL=stack
            LOG_LEVEL=error

            DB_CONNECTION=mysql
            DB_HOST=db.peluqueriafernandez.com
            DB_PORT=3306
            DB_DATABASE=peluqueria
            DB_USERNAME=admin_pelu
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            SESSION_DRIVER=database
            SESSION_LIFETIME=120
            
            QUEUE_CONNECTION=sync

            MAIL_MAILER=smtp
            MAIL_HOST=smtp.gmail.com
            MAIL_PORT=465
            MAIL_USERNAME=danieltrujillopokemon@gmail.com
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            MAIL_ENCRYPTION=ssl
            MAIL_FROM_ADDRESS="no-reply@peluqueriafernandez.com"
            MAIL_FROM_NAME="Peluquería Fernández"
            EOF
            
            composer install --no-dev --optimize-autoloader
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            sudo chown -R ubuntu:www-data /var/www/html
            sudo chmod -R 775 /var/www/html/storage
            sudo chmod -R 775 /var/www/html/bootstrap/cache