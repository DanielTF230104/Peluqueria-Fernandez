<section class="auth">
  <div class="auth-box">

    <h1 class="titulo">Peluquería Fernández</h1>
    <h2>Iniciar sesión</h2>

    <form (ngSubmit)="login()">

      <input type="email" placeholder="Email" [(ngModel)]="usuario.email" name="email" required>

      <input type="password" placeholder="Contraseña" [(ngModel)]="usuario.password" name="password" required>

      <button type="submit" class="btn-principal">Entrar</button>

    </form>

    <p class="link">
      ¿No tienes cuenta?
      <span (click)="irRegistro()">Regístrate</span>
    </p>

  </div>
</section>
